name: Compile Check — Kokkos

# Verify that the Kokkos backend compiles against the installed Kokkos module.
#
# Unlike CUDA, Alpaka, and SYCL, Kokkos bakes the GPU architecture into its
# installation at Kokkos build time (Kokkos_ARCH_* flags). This means we cannot
# matrix over architectures without maintaining multiple Kokkos installations.
#
# The current module (kokkos/5.0.1) targets sm_89 (NVIDIA RTX 2000 Ada).
# This workflow validates that the Phirst Blood Kokkos backend compiles correctly
# against that module. A separate Kokkos installation per architecture would be
# needed to extend this to a full arch matrix.
#
# For AMD and Intel architecture support via Kokkos:
#   - AMD: requires Kokkos built with HIP (Kokkos_ENABLE_HIP + Kokkos_ARCH_AMD_GFXxxx)
#          and a self-hosted-amd runner. See deploy/architectures.yml.
#   - Intel: Kokkos does not currently support Intel GPUs natively.

on:
  push:
    branches: [main, dev/**]
    paths:
      - 'include/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'deploy/architectures.yml'
      - '.github/workflows/compile-check-kokkos.yml'
  pull_request:
    paths:
      - 'include/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'deploy/architectures.yml'
      - '.github/workflows/compile-check-kokkos.yml'

jobs:
  compile-check-kokkos:
    # Arch is determined by the installed Kokkos module (currently sm_89).
    name: "Kokkos (kokkos/5.0.1, sm_89)"
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Kokkos)
        shell: bash -l {0}
        # NOTE: do NOT set CMAKE_CXX_STANDARD before find_package(Kokkos).
        # Kokkos sets its own compiler flags; overriding the standard beforehand
        # can cause silent CUDA kernel failures.
        run: |
          module load kokkos/5.0.1
          cmake -S . -B build-compile-check-kokkos \
            -DPHIRST_BACKEND=KOKKOS \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (Kokkos)
        shell: bash -l {0}
        run: |
          module load kokkos/5.0.1
          cmake --build build-compile-check-kokkos --parallel

      - name: Cleanup
        if: always()
        run: rm -rf build-compile-check-kokkos
