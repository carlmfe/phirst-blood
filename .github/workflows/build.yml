# Build-and-benchmark workflow for all NVIDIA-runner backends.
#
# A single job runs all backends sequentially (continue-on-error per step) so that
# all build directories remain available for the cross-backend benchmark at the end.
#
# Structure:
#   1. Build + test each backend (continue-on-error; no rm -rf between steps)
#   2. Run bench/benchmark.sh across all surviving build directories
#   3. Write a GitHub step summary and upload a benchmark log artifact
#   4. Gate: fail the job if any build failed OR (on main) if consistency check failed
#   5. Clean up all build directories
#
# build-hip.yml is unchanged (workflow_dispatch only; AMD runner).

name: Build

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-and-benchmark:
    runs-on: [self-hosted, gpu]
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------
      # Build + test each backend (keep build dirs for the benchmark step)
      # ------------------------------------------------------------------

      - name: Build & test — SERIAL
        id: build_serial
        continue-on-error: true
        run: |
          cmake -S . -B build-serial \
            -DPHIRST_BACKEND=SERIAL \
            -DPHIRST_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-serial --parallel
          ctest --test-dir build-serial --output-on-failure

      - name: Build & test — CUDA
        id: build_cuda
        continue-on-error: true
        run: |
          module load cuda/13.0
          cmake -S . -B build-cuda \
            -DPHIRST_BACKEND=CUDA \
            -DPHIRST_BUILD_TESTS=ON \
            -DPHIRST_GPU_ARCH=89 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-cuda --parallel
          ctest --test-dir build-cuda --output-on-failure

      - name: Build & test — Kokkos
        id: build_kokkos
        continue-on-error: true
        # kokkos/5.0.1 is built with CUDA; arch is baked into the module (sm_89).
        # Do not set CMAKE_CXX_STANDARD before find_package(Kokkos).
        run: |
          module load kokkos/5.0.1
          cmake -S . -B build-kokkos \
            -DPHIRST_BACKEND=KOKKOS \
            -DPHIRST_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-kokkos --parallel
          ctest --test-dir build-kokkos --output-on-failure

      - name: Build & test — Alpaka
        id: build_alpaka
        continue-on-error: true
        run: |
          module load alpaka/2.0.0_cuda
          cmake -S . -B build-alpaka \
            -DPHIRST_BACKEND=ALPAKA \
            -DPHIRST_BUILD_TESTS=ON \
            -DPHIRST_GPU_ARCH=89 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-alpaka --parallel
          ctest --test-dir build-alpaka --output-on-failure

      - name: Build & test — SYCL/CUDA
        id: build_sycl
        continue-on-error: true
        run: |
          module load sycl/cuda
          cmake -S . -B build-sycl \
            -DPHIRST_BACKEND=SYCL \
            -DPHIRST_BUILD_TESTS=ON \
            -DSYCL_BACKEND=CUDA \
            -DPHIRST_GPU_ARCH=sm_89 \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-sycl --parallel
          ctest --test-dir build-sycl --output-on-failure

      # ------------------------------------------------------------------
      # Cross-backend benchmark (uses whichever build dirs exist)
      # ------------------------------------------------------------------

      - name: Run benchmark
        id: benchmark
        if: always()
        continue-on-error: true
        run: |
          bench/benchmark.sh --check --no-color 10000000 5489 3 2>&1 | tee benchmark.log
          echo "bench_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Benchmark Results"
            echo ""
            echo "**Commit**: \`${{ github.sha }}\`"
            echo "**GPU**: $(nvidia-smi -L 2>/dev/null | head -1 || echo 'unknown')"
            echo ""
            echo "\`\`\`"
            cat benchmark.log 2>/dev/null || echo "(no benchmark output)"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: benchmark.log
          retention-days: 90
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # Gate: fail the job if builds or (on main) consistency check failed
      # ------------------------------------------------------------------

      - name: Check results
        if: always()
        run: |
          failed=0
          [ "${{ steps.build_serial.outcome }}" = "failure" ] && echo "SERIAL build failed"   && failed=1
          [ "${{ steps.build_cuda.outcome }}"   = "failure" ] && echo "CUDA build failed"     && failed=1
          [ "${{ steps.build_kokkos.outcome }}" = "failure" ] && echo "Kokkos build failed"   && failed=1
          [ "${{ steps.build_alpaka.outcome }}" = "failure" ] && echo "Alpaka build failed"   && failed=1
          [ "${{ steps.build_sycl.outcome }}"   = "failure" ] && echo "SYCL build failed"     && failed=1

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bench_exit="${{ steps.benchmark.outputs.bench_exit }}"
            if [ "${bench_exit}" != "0" ]; then
              echo "Benchmark consistency check failed on main — backends disagree."
              failed=1
            fi
          fi

          exit $failed

      # ------------------------------------------------------------------
      # Cleanup (always runs to free disk space)
      # ------------------------------------------------------------------

      - name: Cleanup build directories
        if: always()
        run: rm -rf build-serial build-cuda build-kokkos build-alpaka build-sycl benchmark.log
