name: Build (SYCL)

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-sycl:
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (SYCL backend + tests)
        shell: bash -l {0}
        run: |
          module load sycl/cuda
          cmake -S . -B build-sycl \
            -DPHIRST_BACKEND=SYCL \
            -DPHIRST_BUILD_TESTS=ON \
            -DSYCL_BACKEND=CUDA \
            -DPHIRST_GPU_ARCH=sm_89 \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash -l {0}
        run: |
          module load sycl/cuda
          cmake --build build-sycl --parallel

      - name: Run tests
        shell: bash -l {0}
        run: |
          module load sycl/cuda
          ctest --test-dir build-sycl --output-on-failure
