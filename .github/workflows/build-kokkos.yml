name: Build (KOKKOS)

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-kokkos:
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Kokkos backend)
        # Note: kokkos/5.0.1 is built with CUDA; the runner must provide GCC ≤ 12
        # (or the module must set CC/CXX to a compatible compiler).
        shell: bash -l {0}
        run: |
          module load kokkos/5.0.1
          cmake -S . -B build-kokkos \
            -DPHIRST_BACKEND=KOKKOS \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build examples
        shell: bash -l {0}
        run: |
          module load kokkos/5.0.1
          cmake --build build-kokkos --parallel

      - name: Configure tests
        run: |
          cmake -S tests -B build-kokkos-tests \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SOURCE_DIR=${{ github.workspace }}

      - name: Build tests
        run: cmake --build build-kokkos-tests --parallel

      - name: Run tests
        run: |
          cd build-kokkos-tests
          ctest --output-on-failure
