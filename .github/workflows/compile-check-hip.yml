name: Compile Check — HIP

# Verify that the HIP backend compiles for all targeted AMD architectures.
# This is a compile-only check; no GPU execution is performed.
# Architecture matrix mirrors deploy/architectures.yml (AMD entries, HIP backend).
#
# DISABLED: requires a self-hosted-amd runner with ROCm installed.
# All jobs use 'if: false' as a placeholder. When the runner is available:
#   1. Register it with the label 'self-hosted-amd'
#   2. Remove 'if: false' from the job
#   3. Set runs-on to [self-hosted, amd]
#
# CMake usage: cmake -DPHIRST_BACKEND=HIP -DPHIRST_GPU_ARCH=gfx1100 ..
# PHIRST_GPU_ARCH accepts gfx* strings; auto-detects via rocm_agent_enumerator if unset.

on:
  push:
    branches: [main, dev/**]
    paths:
      - 'include/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'deploy/architectures.yml'
      - '.github/workflows/compile-check-hip.yml'
  pull_request:
    paths:
      - 'include/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'deploy/architectures.yml'
      - '.github/workflows/compile-check-hip.yml'

jobs:
  compile-check-hip:
    name: "HIP ${{ matrix.arch }} (${{ matrix.name }}) — disabled: no runner"
    # DISABLED — remove 'if: false' and update runs-on when self-hosted-amd is available
    if: false
    runs-on: [self-hosted, amd]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: "gfx908",  name: "AMD MI100 (CDNA1)" }
          - { arch: "gfx90a",  name: "AMD MI250/MI250X (CDNA2)" }
          - { arch: "gfx942",  name: "AMD MI300X (CDNA3)" }
          - { arch: "gfx1100", name: "AMD RX 7900 XT (RDNA3)" }

    steps:
      - uses: actions/checkout@v4

      - name: Configure (HIP, ${{ matrix.arch }})
        shell: bash -l {0}
        # Load the ROCm module appropriate for the runner, e.g.:
        #   module load rocm/6.x
        run: |
          cmake -S . -B build-compile-check-hip-${{ matrix.arch }} \
            -DPHIRST_BACKEND=HIP \
            -DPHIRST_GPU_ARCH=${{ matrix.arch }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (HIP, ${{ matrix.arch }})
        shell: bash -l {0}
        run: cmake --build build-compile-check-hip-${{ matrix.arch }} --parallel

      - name: Cleanup
        if: always()
        run: rm -rf build-compile-check-hip-${{ matrix.arch }}
