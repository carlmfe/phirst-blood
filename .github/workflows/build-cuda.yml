name: Build (CUDA)

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-cuda:
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CUDA backend)
        shell: bash -l {0}
        run: |
          module load cuda/13.0
          cmake -S . -B build-cuda \
            -DPHIRST_BACKEND=CUDA \
            -DPHIRST_GPU_ARCH=89 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build examples
        shell: bash -l {0}
        run: |
          module load cuda/13.0
          cmake --build build-cuda --parallel

      - name: Configure tests
        run: |
          cmake -S tests -B build-cuda-tests \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SOURCE_DIR=${{ github.workspace }}

      - name: Build tests
        run: cmake --build build-cuda-tests --parallel

      - name: Run tests
        run: |
          cd build-cuda-tests
          ctest --output-on-failure
