name: Python (CUDA)

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-python-cuda:
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python build/test deps
        shell: bash -l {0}
        run: |
          which uv || true
          if command -v uv >/dev/null 2>&1; then
            uv pip install scikit-build-core nanobind pytest
          else
            pip install scikit-build-core nanobind pytest
          fi

      - name: Build Python bindings (CUDA)
        shell: bash -l {0}
        run: |
          module load cuda/13.0
          if command -v uv >/dev/null 2>&1; then
            uv pip install -e . --no-build-isolation \
              -Ccmake.args="-DPHIRST_BACKEND=CUDA;-DPHIRST_GPU_ARCH=89"
          else
            pip install -e . --no-build-isolation \
              -Ccmake.args="-DPHIRST_BACKEND=CUDA;-DPHIRST_GPU_ARCH=89"
          fi

      - name: Run Python tests
        shell: bash -l {0}
        run: |
          module load cuda/13.0
          if command -v uv >/dev/null 2>&1; then
            uv run pytest python/tests/ -v
          else
            python -m pytest python/tests/ -v
          fi
