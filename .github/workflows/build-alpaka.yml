name: Build (ALPAKA)

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-alpaka:
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Alpaka backend, CUDA sub-backend)
        shell: bash -l {0}
        run: |
          module load alpaka/2.0.0_cuda
          cmake -S . -B build-alpaka \
            -DPHIRST_BACKEND=ALPAKA \
            -DALPAKA_BACKEND=CUDA \
            -DPHIRST_BUILD_TESTS=ON \
            -DPHIRST_GPU_ARCH=89 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build examples
        shell: bash -l {0}
        run: |
          module load alpaka/2.0.0_cuda
          cmake --build build-alpaka --parallel

      - name: Run tests
        run: |
          module load alpaka/2.0.0_cuda
          ctest --test-dir build-alpaka --output-on-failure
