name: Build (ALPAKA)

on:
  push:
    branches: [main, "dev/**"]
  pull_request:

jobs:
  build-alpaka:
    runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Alpaka backend, CUDA sub-backend)
        shell: bash -l {0}
        run: |
          module load alpaka/2.0.0_cuda
          cmake -S . -B build-alpaka \
            -DPHIRST_BACKEND=ALPAKA \
            -DALPAKA_BACKEND=CUDA \
            -DPHIRST_GPU_ARCH=89 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build examples
        shell: bash -l {0}
        run: |
          module load alpaka/2.0.0_cuda
          cmake --build build-alpaka --parallel

      # Alpaka GPU test integration is deferred: alpaka_add_executable() is not
      # compatible with the plain add_executable() used in tests/CMakeLists.txt.
      # Tests are compiled with the SERIAL backend as a fallback, verifying
      # algorithm correctness independently of the Alpaka dispatch layer.
      - name: Configure tests (SERIAL fallback)
        run: |
          cmake -S tests -B build-alpaka-tests \
            -DPHIRST_BACKEND=SERIAL \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build tests
        run: cmake --build build-alpaka-tests --parallel

      - name: Run tests
        run: ctest --test-dir build-alpaka-tests --output-on-failure
